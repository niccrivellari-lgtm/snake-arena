<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>🐍 Snake Arena</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --g:#00ff88;
  --r:#ff4466;
  --y:#ffdd00;
  --bg:#070d0a;
  --panel:rgba(0,255,136,0.06);
  --border:rgba(0,255,136,0.2);
}

body{
  background:var(--bg);
  color:var(--g);
  font-family:'Share Tech Mono',monospace;
  overflow:hidden;
  height:100vh;width:100vw;
  display:flex;align-items:center;justify-content:center;
}

/* ── SCANLINES overlay ── */
body::after{
  content:'';
  position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,0.03) 0px,rgba(0,0,0,0.03) 1px,transparent 1px,transparent 3px);
  pointer-events:none;z-index:999;
}

/* ── LOBBY ── */
#lobby{
  display:flex;flex-direction:column;align-items:center;gap:24px;
  position:relative;z-index:1;
}
#lobby h1{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(1.4rem,4vw,2.8rem);
  color:var(--g);
  text-shadow:0 0 20px var(--g),0 0 60px rgba(0,255,136,0.3);
  letter-spacing:0.06em;
  animation:glow 2s ease-in-out infinite;
  text-align:center;
  line-height:1.5;
}
@keyframes glow{
  0%,100%{text-shadow:0 0 20px var(--g),0 0 60px rgba(0,255,136,0.3)}
  50%{text-shadow:0 0 40px var(--g),0 0 100px rgba(0,255,136,0.5),0 0 180px rgba(0,255,136,0.15)}
}
.tagline{
  font-size:0.7rem;letter-spacing:0.3em;
  color:rgba(0,255,136,0.45);text-transform:uppercase;
}
.box{
  background:var(--panel);
  border:1px solid var(--border);
  padding:32px 40px;
  display:flex;flex-direction:column;gap:18px;align-items:center;
  min-width:300px;
  position:relative;
}
/* pixel corners */
.box::before,.box::after{
  content:'';position:absolute;width:12px;height:12px;
  border-color:var(--g);border-style:solid;
}
.box::before{top:-1px;left:-1px;border-width:2px 0 0 2px;}
.box::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0;}

.box label{font-size:0.65rem;letter-spacing:0.22em;color:rgba(0,255,136,0.5);align-self:flex-start;}
#nameInput{
  width:100%;background:rgba(0,255,136,0.05);
  border:1px solid var(--border);
  color:var(--g);font-family:'Press Start 2P',monospace;font-size:0.85rem;
  padding:10px 14px;outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;
  text-transform:uppercase;letter-spacing:0.1em;
}
#nameInput:focus{border-color:var(--g);box-shadow:0 0 14px rgba(0,255,136,0.25);}
#joinBtn{
  width:100%;background:var(--g);color:#000;border:none;
  font-family:'Press Start 2P',monospace;font-size:0.75rem;
  letter-spacing:0.1em;padding:14px;cursor:pointer;
  transition:transform 0.1s,box-shadow 0.2s;text-transform:uppercase;
  image-rendering:pixelated;
}
#joinBtn:hover{box-shadow:0 0 24px rgba(0,255,136,0.5);transform:translateY(-2px);}
#joinBtn:active{transform:translateY(1px);}

.ctrl{
  display:grid;grid-template-columns:1fr 1fr;gap:6px 20px;
  font-size:0.6rem;color:rgba(0,255,136,0.4);letter-spacing:0.1em;
}
.ctrl span{color:var(--g);}

/* ── GAME ── */
#gameWrap{display:none;position:relative;width:100vw;height:100vh;overflow:hidden;}

#gameCanvas{display:block;}

/* HUD top */
#hud{
  position:absolute;top:0;left:0;right:0;
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:10px 14px;pointer-events:none;gap:10px;
}
.hpanel{
  background:var(--panel);border:1px solid var(--border);
  padding:8px 14px;font-size:0.65rem;letter-spacing:0.15em;
}
.hpanel .val{
  font-family:'Press Start 2P',monospace;font-size:0.9rem;
  color:var(--g);margin-top:4px;
}
.lbl{color:rgba(0,255,136,0.45);font-size:0.58rem;letter-spacing:0.2em;text-transform:uppercase;}

/* Leaderboard */
#board{
  position:absolute;top:10px;right:14px;
  background:var(--panel);border:1px solid var(--border);
  padding:10px 14px;min-width:190px;pointer-events:none;
}
#board h3{font-family:'Press Start 2P',monospace;font-size:0.5rem;letter-spacing:0.15em;color:rgba(0,255,136,0.45);margin-bottom:8px;}
.brow{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid rgba(0,255,136,0.07);font-size:0.68rem;}
.brow:last-child{border:none;}
.bname{max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bscore{font-family:'Press Start 2P',monospace;font-size:0.55rem;color:var(--y);}
.bme{color:#fff!important;}

/* Dead overlay */
#deadOverlay{
  display:none;position:absolute;inset:0;
  background:rgba(7,13,10,0.82);
  align-items:center;justify-content:center;flex-direction:column;gap:14px;
  backdrop-filter:blur(3px);
}
#deadOverlay h2{
  font-family:'Press Start 2P',monospace;font-size:clamp(1.4rem,4vw,2.5rem);
  color:var(--r);text-shadow:0 0 30px var(--r);
  animation:blink 0.5s step-end infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
#deadOverlay p{font-size:0.7rem;color:rgba(0,255,136,0.6);letter-spacing:0.15em;}

/* Minimap */
#minimap{
  position:absolute;bottom:14px;left:14px;
  border:1px solid var(--border);background:rgba(7,13,10,0.8);
  pointer-events:none;image-rendering:pixelated;
}

/* kill feed */
#killfeed{
  position:absolute;bottom:14px;right:14px;
  display:flex;flex-direction:column;gap:4px;
  pointer-events:none;align-items:flex-end;
}
.kfitem{
  background:rgba(7,13,10,0.85);border-left:2px solid var(--r);
  padding:4px 10px;font-size:0.62rem;letter-spacing:0.1em;
  animation:fadeout 3s forwards;
}
@keyframes fadeout{0%,70%{opacity:1}100%{opacity:0}}
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <h1>🐍 SNAKE<br>ARENA</h1>
  <p class="tagline">Battle Royale · Lobby Globale · Real-Time</p>
  <div class="box">
    <label>NOME SERPENTE</label>
    <input id="nameInput" maxlength="16" placeholder="INSERISCI NOME" autocomplete="off"/>
    <button id="joinBtn">▶ ENTRA IN PARTITA</button>
    <div class="ctrl">
      <div><span>↑ W</span> — Su</div>
      <div><span>↓ S</span> — Giù</div>
      <div><span>← A</span> — Sinistra</div>
      <div><span>→ D</span> — Destra</div>
    </div>
  </div>
</div>

<!-- GAME -->
<div id="gameWrap">
  <canvas id="gameCanvas"></canvas>

  <div id="hud">
    <div class="hpanel">
      <div class="lbl">LUNGHEZZA</div>
      <div class="val" id="lenNum">3</div>
    </div>
    <div class="hpanel" style="text-align:center">
      <div class="lbl">PUNTEGGIO</div>
      <div class="val" id="scoreNum">0</div>
    </div>
    <div class="hpanel" style="text-align:center">
      <div class="lbl">KILLS</div>
      <div class="val" id="killsNum">0</div>
    </div>
    <div class="hpanel" style="text-align:center">
      <div class="lbl">ONLINE</div>
      <div class="val" id="onlineNum">0</div>
    </div>
  </div>

  <div id="board">
    <h3>🏆 CLASSIFICA</h3>
    <div id="boardRows"></div>
  </div>

  <div id="deadOverlay">
    <h2>HAI PERSO!</h2>
    <p id="deadTimer">RESPAWN TRA 3s</p>
  </div>

  <canvas id="minimap" width="120" height="120"></canvas>
  <div id="killfeed"></div>
</div>

<script>
// ──────────────────────────────────────────────────────────────
//  CONFIG
// ──────────────────────────────────────────────────────────────
let GRID = 40, CELL = 20;
let myId = null, ws = null;
let gameState = null;
let prevState = null;
let killFeedItems = [];

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const minimap = document.getElementById('minimap');
const mCtx = minimap.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  if (gameState) CELL = Math.floor(Math.min(canvas.width, canvas.height) / GRID);
}
resize();
window.addEventListener('resize', resize);

// ──────────────────────────────────────────────────────────────
//  CONTROLS
// ──────────────────────────────────────────────────────────────
const DIR = {
  ArrowUp:    {x:0,y:-1}, KeyW:    {x:0,y:-1},
  ArrowDown:  {x:0,y:1},  KeyS:    {x:0,y:1},
  ArrowLeft:  {x:-1,y:0}, KeyA:    {x:-1,y:0},
  ArrowRight: {x:1,y:0},  KeyD:    {x:1,y:0},
};

window.addEventListener('keydown', e => {
  if (!ws || ws.readyState !== 1 || !myId) return;
  const d = DIR[e.code];
  if (d) {
    e.preventDefault();
    ws.send(JSON.stringify({ type:'dir', dir:d }));
  }
});

// Swipe mobile
let touchStart = null;
window.addEventListener('touchstart', e => { touchStart = e.touches[0]; }, {passive:true});
window.addEventListener('touchend', e => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.clientX;
  const dy = e.changedTouches[0].clientY - touchStart.clientY;
  if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
  let d;
  if (Math.abs(dx) > Math.abs(dy)) d = dx > 0 ? {x:1,y:0} : {x:-1,y:0};
  else d = dy > 0 ? {x:0,y:1} : {x:0,y:-1};
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type:'dir', dir:d }));
}, {passive:true});

// ──────────────────────────────────────────────────────────────
//  JOIN
// ──────────────────────────────────────────────────────────────
document.getElementById('joinBtn').addEventListener('click', joinGame);
document.getElementById('nameInput').addEventListener('keydown', e => { if(e.key==='Enter') joinGame(); });

function joinGame() {
  const name = document.getElementById('nameInput').value.trim() || 'SERPENTE';
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}`);

  ws.onopen = () => ws.send(JSON.stringify({ type:'join', name }));

  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'init') {
      myId = msg.id;
      GRID = msg.grid;
      CELL = Math.floor(Math.min(canvas.width, canvas.height) / GRID);
      document.getElementById('lobby').style.display = 'none';
      document.getElementById('gameWrap').style.display = 'block';
      requestAnimationFrame(loop);
    }
    if (msg.type === 'state') {
      detectKills(prevState, msg);
      prevState = gameState;
      gameState = msg;
    }
  };

  ws.onclose = () => {
    document.getElementById('gameWrap').style.display = 'none';
    document.getElementById('lobby').style.display = 'flex';
    gameState = null; prevState = null; myId = null;
  };
}

// ──────────────────────────────────────────────────────────────
//  KILL FEED
// ──────────────────────────────────────────────────────────────
function detectKills(prev, curr) {
  if (!prev) return;
  for (const cp of curr.players) {
    const pp = prev.players.find(p => p.id === cp.id);
    if (!pp) continue;
    if (cp.kills > pp.kills) {
      // trovato un nuovo kill — chi ha ucciso chi?
      // cerchiamo chi è morto nel frame corrente
      for (const cp2 of curr.players) {
        const pp2 = prev.players.find(p => p.id === cp2.id);
        if (!pp2) continue;
        if (!cp2.alive && pp2.alive) {
          addKillFeed(cp.name, cp.color, cp2.name, cp2.color);
        }
      }
    }
  }
}

function addKillFeed(killer, kColor, victim, vColor) {
  const feed = document.getElementById('killfeed');
  const el = document.createElement('div');
  el.className = 'kfitem';
  el.innerHTML = `<span style="color:${kColor}">${killer.toUpperCase()}</span> 💀 <span style="color:${vColor}">${victim.toUpperCase()}</span>`;
  feed.appendChild(el);
  setTimeout(() => el.remove(), 3100);
}

// ──────────────────────────────────────────────────────────────
//  CAMERA — centra sul serpente del giocatore
// ──────────────────────────────────────────────────────────────
let camX = 0, camY = 0;
let camTargetX = 0, camTargetY = 0;

function updateCamera(me) {
  if (!me || !me.body || !me.body[0]) return;
  const head = me.body[0];
  const worldX = head.x * CELL + CELL/2;
  const worldY = head.y * CELL + CELL/2;
  camTargetX = worldX - canvas.width/2;
  camTargetY = worldY - canvas.height/2;
  camX += (camTargetX - camX) * 0.15;
  camY += (camTargetY - camY) * 0.15;
}

// ──────────────────────────────────────────────────────────────
//  DRAW
// ──────────────────────────────────────────────────────────────
// Interpolazione tick
let lastTickTime = 0;
let interpT = 0;

function loop(ts) {
  requestAnimationFrame(loop);
  if (!gameState) return;

  const me = gameState.players.find(p => p.id === myId);
  if (me) updateCamera(me);

  const W = GRID * CELL;
  const H = GRID * CELL;

  // BG
  ctx.fillStyle = '#070d0a';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.save();
  ctx.translate(-camX, -camY);

  // Grid
  ctx.strokeStyle = 'rgba(0,255,136,0.05)';
  ctx.lineWidth = 1;
  for (let x = 0; x <= GRID; x++) {
    ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,H); ctx.stroke();
  }
  for (let y = 0; y <= GRID; y++) {
    ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(W,y*CELL); ctx.stroke();
  }

  // Border
  ctx.strokeStyle = 'rgba(0,255,136,0.4)';
  ctx.lineWidth = 3;
  ctx.strokeRect(0,0,W,H);

  // Food
  for (const f of gameState.food) {
    const fx = f.x * CELL + CELL/2;
    const fy = f.y * CELL + CELL/2;
    const t = Date.now() / 400;
    const pulse = 0.85 + 0.15 * Math.sin(t + f.x + f.y);
    const isSpecial = f.value > 1;

    ctx.save();
    ctx.translate(fx, fy);
    ctx.rotate(t * 0.5);

    const size = (isSpecial ? CELL*0.45 : CELL*0.32) * pulse;
    ctx.shadowBlur = isSpecial ? 22 : 12;
    ctx.shadowColor = isSpecial ? '#ffdd00' : '#00ff88';

    if (isSpecial) {
      // stella
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const a = (i * 4 * Math.PI / 5) - Math.PI/2;
        const b = ((i*2+1) * 2 * Math.PI / 10) - Math.PI/2;
        if (i===0) ctx.moveTo(Math.cos(a)*size, Math.sin(a)*size);
        else ctx.lineTo(Math.cos(a)*size, Math.sin(a)*size);
        ctx.lineTo(Math.cos(b)*size*0.45, Math.sin(b)*size*0.45);
      }
      ctx.closePath();
      ctx.fillStyle = '#ffdd00';
    } else {
      ctx.beginPath();
      ctx.arc(0, 0, size, 0, Math.PI*2);
      ctx.fillStyle = '#00ff88';
    }
    ctx.fill();
    ctx.restore();
  }

  // Serpenti
  for (const p of gameState.players) {
    if (!p.alive || !p.body || p.body.length === 0) continue;
    const isMe = p.id === myId;

    for (let i = p.body.length - 1; i >= 0; i--) {
      const seg = p.body[i];
      const cx2 = seg.x * CELL;
      const cy2 = seg.y * CELL;
      const pct = i / p.body.length;

      // Colore: più brillante verso la testa
      const alpha = isMe ? 1 : 0.85;
      ctx.save();

      if (i === 0) {
        // TESTA
        ctx.shadowBlur = 18; ctx.shadowColor = p.color;
        ctx.fillStyle = p.color;
        // arrotondata
        const r = CELL * 0.47;
        ctx.beginPath();
        ctx.roundRect(cx2 + 1, cy2 + 1, CELL-2, CELL-2, r);
        ctx.fill();

        // Occhi
        ctx.shadowBlur = 0;
        const eyeOff = 4, eyeR = 2.5;
        ctx.fillStyle = '#000';
        // occhio in base alla direzione
        const dx = p.dir.x, dy = p.dir.y;
        const ex1 = cx2 + CELL/2 + dy*eyeOff + dx*(CELL/3);
        const ey1 = cy2 + CELL/2 - dx*eyeOff + dy*(CELL/3);
        const ex2 = cx2 + CELL/2 - dy*eyeOff + dx*(CELL/3);
        const ey2 = cy2 + CELL/2 + dx*eyeOff + dy*(CELL/3);
        ctx.beginPath(); ctx.arc(ex1, ey1, eyeR, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(ex2, ey2, eyeR, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(ex1-0.8, ey1-0.8, 1, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(ex2-0.8, ey2-0.8, 1, 0, Math.PI*2); ctx.fill();

        // Nome sopra la testa
        ctx.font = isMe ? 'bold 11px "Share Tech Mono"' : '10px "Share Tech Mono"';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.shadowBlur = 6; ctx.shadowColor = p.color;
        ctx.fillStyle = isMe ? '#fff' : 'rgba(255,255,255,0.75)';
        ctx.fillText(p.name.toUpperCase(), cx2 + CELL/2, cy2 - 4);

      } else {
        // CORPO — sfuma verso la coda
        const brightness = 0.4 + 0.6 * (1 - pct);
        ctx.shadowBlur = 4; ctx.shadowColor = p.color;
        // parse colore hex e schiarisci
        ctx.fillStyle = hexAlpha(p.color, brightness * alpha);
        const pad = 1 + pct * 2;
        ctx.beginPath();
        ctx.roundRect(cx2+pad, cy2+pad, CELL-pad*2, CELL-pad*2, (CELL-pad*2)*0.35);
        ctx.fill();
      }
      ctx.restore();
    }
  }

  // Serpenti morti — effetto dissolvenza
  for (const p of gameState.players) {
    if (p.alive) continue;
    // niente da disegnare, già spariti
  }

  ctx.restore(); // fine world

  // ── HUD ─────────────────────────────────────────────────────
  if (me) {
    document.getElementById('lenNum').textContent = me.body ? me.body.length : 0;
    document.getElementById('scoreNum').textContent = me.score || 0;
    document.getElementById('killsNum').textContent = me.kills || 0;
  }
  document.getElementById('onlineNum').textContent = gameState.players.length;

  // Dead overlay
  const dead = document.getElementById('deadOverlay');
  if (me && !me.alive) {
    dead.style.display = 'flex';
    const s = Math.max(0, Math.ceil((me.respawnAt - Date.now()) / 1000));
    document.getElementById('deadTimer').textContent = `RESPAWN TRA ${s}s`;
  } else {
    dead.style.display = 'none';
  }

  // Leaderboard
  const sorted = [...gameState.players].sort((a,b) => (b.score||0) - (a.score||0)).slice(0,8);
  document.getElementById('boardRows').innerHTML = sorted.map(p => `
    <div class="brow">
      <span class="bname ${p.id===myId?'bme':''}" style="color:${p.color}">${p.name.toUpperCase()}</span>
      <span class="bscore">${p.score||0}pt · ${p.kills||0}K</span>
    </div>
  `).join('');

  // Minimap
  const mw = minimap.width, mh = minimap.height;
  mCtx.fillStyle = 'rgba(7,13,10,0.9)';
  mCtx.fillRect(0,0,mw,mh);
  const sx = mw/GRID, sy = mh/GRID;
  for (const f of gameState.food) {
    mCtx.fillStyle = f.value>1?'#ffdd00':'#00ff88';
    mCtx.fillRect(f.x*sx, f.y*sy, sx, sy);
  }
  for (const p of gameState.players) {
    if (!p.alive || !p.body) continue;
    for (let i=0;i<p.body.length;i++) {
      const seg = p.body[i];
      mCtx.fillStyle = i===0 ? p.color : hexAlpha(p.color,0.5);
      mCtx.fillRect(seg.x*sx, seg.y*sy, sx, sy);
    }
  }
  // viewport rect
  mCtx.strokeStyle = 'rgba(0,255,136,0.4)';
  mCtx.lineWidth=1;
  mCtx.strokeRect(camX/CELL*sx, camY/CELL*sy, canvas.width/CELL*sx, canvas.height/CELL*sy);
}

// ── Utility ──────────────────────────────────────────────────
function hexAlpha(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}
</script>
</body>
</html>
